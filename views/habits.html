<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hábitos - Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/habits.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">🎯 Habit Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">📊 Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/habits">✅ Hábitos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/routines">🔄 Rutinas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/statistics">📈 Estadísticas</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <span class="user-badge" id="userName">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile">👤 Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div id="alertContainer"></div>

        <div class="page-header">
            <div class="page-title">✅ Mis Hábitos</div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#habitModal">
                + Nuevo Hábito
            </button>
        </div>

        <!-- FILTERS -->
        <div class="filters-bar">
            <span style="font-weight: 600; color: #374151; font-size: 0.9rem;">Filtrar:</span>
            <button class="filter-btn active" onclick="filterHabits('all')">Todos</button>
            <button class="filter-btn" onclick="filterHabits('daily')">Diario</button>
            <button class="filter-btn" onclick="filterHabits('weekly')">Semanal</button>
            <div id="categoryFilters"></div>
        </div>

        <!-- HABITS GRID -->
        <div class="habits-grid" id="habitsGrid">
            <div class="empty-state">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3">Cargando hábitos...</p>
            </div>
        </div>
    </div>

    <!-- MODAL CREAR/EDITAR HÁBITO -->
    <div class="modal fade" id="habitModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nuevo Hábito</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modalAlert"></div>
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control" id="habitName" placeholder="Ej: Tomar agua" maxlength="255">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" id="habitDesc" rows="2" placeholder="Descripción opcional" maxlength="1000"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" id="habitCategory">
                            <option value="">Sin categoría</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Frecuencia</label>
                        <select class="form-select" id="habitFrequency">
                            <option value="daily">Diario</option>
                            <option value="weekly">Semanal</option>
                            <option value="custom">Personalizado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hora de Recordatorio</label>
                        <input type="time" class="form-control" id="habitReminder">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveHabitBtn" onclick="saveHabit()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINAR -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar Hábito</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    ¿Estás seguro que deseas eliminar <strong id="deleteHabitName"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="confirmDelete()">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <footer>Vladimir Perez Soto - Danny Enmanuel Guerrero</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/habits.js"></script>
</body>
</html>
