
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                🎯 Habit Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="userDropdown" data-bs-toggle="dropdown">
                            <span class="user-badge" id="userNameNav">Usuario</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item active" href="/profile">Mi Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Configuración</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">Cerrar Sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar-container">
                <img src="" alt="Avatar" class="profile-avatar" id="profileAvatar">
                <label for="avatarInput" class="avatar-upload-btn" title="Cambiar foto">
                    📷
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>
            <div id="avatarAlert"></div>
            <h2 class="profile-name" id="userName">Cargando...</h2>
            <p class="profile-email" id="userEmail">email@example.com</p>
            
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalHabits">0</div>
                    <div class="stat-label">Hábitos Activos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">Racha Actual</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="completedToday">0</div>
                    <div class="stat-label">Completados Hoy</div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Información Personal -->
            <div class="col-lg-6 mb-4">
                <div class="profile-section">
                    <h3 class="section-title">Información Personal</h3>
                    <div id="personalInfoAlert"></div>
                    
                    <form id="personalInfoForm">
                        <div class="form-group">
                            <label for="editFullName" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="editFullName" required>
                        </div>

                        <div class="form-group">
                            <label for="editEmail" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>

            <!-- Cambiar Contraseña -->
            <div class="col-lg-6 mb-4">
                <div class="profile-section">
                    <h3 class="section-title">Cambiar Contraseña</h3>
                    <div id="passwordAlert"></div>
                    
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="currentPassword" class="form-label">Contraseña Actual</label>
                            <input type="password" class="form-control" id="currentPassword" required>
                        </div>

                        <div class="form-group">
                            <label for="newPassword" class="form-label">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="newPassword" 
                                   placeholder="Mínimo 6 caracteres, incluye un número" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirmar Nueva Contraseña</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                            <div id="passwordMatchIndicator" class="password-match-indicator"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Cambiar Contraseña
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

      <footer class="text-center py-3 mt-4" style="color: #999; font-size: 0.85rem;">
        Vladimir Perez Soto - Danny Enmanuel Guerrero
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
