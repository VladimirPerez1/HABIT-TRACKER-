<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/reset-password.css">
</head>
<body>
    <div class="container">
        <div class="reset-container">
            <div class="icon-container">
                🔑
            </div>
            
            <h2 class="reset-title">Restablecer Contraseña</h2>
            <p class="reset-subtitle">Ingresa tu nueva contraseña</p>
            
            <!-- Alert para mensajes -->
            <div id="alertContainer"></div>
            
            <form id="resetForm">
                <div class="mb-3">
                    <label for="password" class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control form-control-lg" id="password" 
                           placeholder="Mínimo 6 caracteres" required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="text-muted" id="strengthText">La contraseña debe tener al menos 6 caracteres y un número</small>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-control form-control-lg" id="confirmPassword" 
                           placeholder="Repite tu contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="submitBtn">
                    <span id="btnText">Cambiar Contraseña</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </span>
                </button>
            </form>
        </div>
    </div>

     <footer class="text-center py-3 mt-4" style="color: rgba(255,255,255,0.7); font-size: 0.85rem;">
        Vladimir Perez Soto - Danny Enmanuel Guerrero
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/reset-password.js"></script>
</body>
</html>
